<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leet Rater — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: #1a1a1a;
      color: #eff1f6;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #3a3a3a;
    }

    .header-icon {
      font-size: 18px;
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      color: #ffa116;
      letter-spacing: 0.3px;
    }

    .header-sub {
      font-size: 11px;
      color: #8a8a8a;
      margin-top: 1px;
    }

    .section {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #8a8a8a;
      margin-bottom: 6px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: #282828;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #eff1f6;
      font-size: 13px;
      font-family: 'Consolas', monospace;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #ffa116;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
    }

    .btn {
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .btn-primary {
      background: #ffa116;
      color: #1a1a1a;
    }

    .btn-primary:hover { background: #cc8010; }

    .btn-ghost {
      background: #333;
      color: #eff1f6;
    }

    .btn-ghost:hover { background: #3a3a3a; }

    .hint {
      font-size: 11px;
      color: #8a8a8a;
      margin-top: 6px;
      line-height: 1.5;
    }

    .hint a {
      color: #ffa116;
      text-decoration: none;
    }

    .hint a:hover { text-decoration: underline; }

    .status {
      margin-top: 8px;
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 6px;
      display: none;
    }

    .status.success {
      background: rgba(0, 184, 163, 0.12);
      color: #00b8a3;
      border: 1px solid rgba(0, 184, 163, 0.25);
    }

    .status.error {
      background: rgba(239, 71, 67, 0.1);
      color: #ef4743;
      border: 1px solid rgba(239, 71, 67, 0.25);
    }

    .divider {
      height: 1px;
      background: #3a3a3a;
      margin: 18px 0;
    }

    .pilot-badge {
      display: inline-block;
      background: rgba(255, 161, 22, 0.15);
      color: #ffa116;
      border: 1px solid rgba(255, 161, 22, 0.3);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      margin-left: 6px;
      vertical-align: middle;
    }

    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #282828;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 10px 12px;
    }

    .mode-label {
      font-size: 12px;
      color: #eff1f6;
    }

    .mode-sub {
      font-size: 11px;
      color: #8a8a8a;
      margin-top: 2px;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #3a3a3a;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #8a8a8a;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }

    .toggle input:checked + .toggle-slider { background: rgba(255,161,22,0.3); }
    .toggle input:checked + .toggle-slider::before {
      transform: translateX(16px);
      background: #ffa116;
    }

    .footer {
      margin-top: 4px;
      font-size: 11px;
      color: #555;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="header-icon">⚡</span>
    <div>
      <div class="header-title">Leet Rater</div>
      <div class="header-sub">Settings</div>
    </div>
  </div>

  <!-- Mode toggle -->
  <div class="section">
    <label>Mode <span class="pilot-badge">Pilot</span></label>
    <div class="mode-row">
      <div>
        <div class="mode-label">Pilot mode</div>
        <div class="mode-sub">Uses mock data — no API key needed</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="pilot-toggle" />
        <span class="toggle-slider"></span>
      </label>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Groq API key -->
  <div class="section">
    <label>Groq API Key</label>
    <div class="input-row">
      <input type="password" id="api-key-input" placeholder="gsk_••••••••••••••••••••••" />
      <button class="btn btn-ghost" id="toggle-visibility">Show</button>
    </div>
    <p class="hint">
      Get your free key at
      <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a>
      — no credit card required.
    </p>
    <div class="status" id="status-msg"></div>
  </div>

  <button class="btn btn-primary" id="save-btn" style="width:100%">Save settings</button>

  <div class="divider"></div>

  <div class="footer">v1.0 · Pilot build</div>

  <script src="settings.js"></script>
</body>
</html>
